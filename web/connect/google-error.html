<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Connection Error</title>
    <link rel="stylesheet" href="/tokens.css" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <p class="eyebrow">Google OAuth</p>
        <h1>Connection failed</h1>
        <p class="lead" id="oauth-error-text">Google OAuth did not complete. Check the callback URL, client credentials, and Convex logs.</p>
      </section>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const error = params.get("error");
      if (error) {
        const el = document.getElementById("oauth-error-text");
        if (el) el.textContent = decodeURIComponent(error);
      }
    </script>
  </body>
  </html>
